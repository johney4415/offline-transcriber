name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: >
          pip install -r requirements.txt pyinstaller huggingface-hub
          --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Cache models (speech + LLM)
        id: model-cache
        uses: actions/cache@v4
        with:
          path: |
            model
            llm
          key: models-whisper-turbo-qwen25-3b-v1

      - name: Download models (~3.6GB)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # HF rate-limits shared CI IPs (429) - retry with backoff
          $delays = 30, 60, 120, 240
          foreach ($d in $delays + 0) {
            python scripts/download_model.py .
            if ($LASTEXITCODE -eq 0) { break }
            if ($d -eq 0) { exit 1 }
            Write-Host "Download failed, retrying in $d s ..."
            Start-Sleep -Seconds $d
          }

      - name: Build with PyInstaller
        run: pyinstaller app.spec --noconfirm

      - name: Bundle models and dictionary into output
        shell: pwsh
        run: |
          Copy-Item -Recurse model dist/OfflineTranscriber/model
          Copy-Item -Recurse llm dist/OfflineTranscriber/llm
          Copy-Item dictionary.json dist/OfflineTranscriber/

      - name: Smoke test (built exe exists)
        shell: pwsh
        run: |
          if (!(Test-Path "dist/OfflineTranscriber/OfflineTranscriber.exe")) {
            throw "exe not found"
          }
          if (!(Test-Path "dist/OfflineTranscriber/llm/qwen2.5-3b-instruct-q4_k_m.gguf")) {
            throw "LLM model not bundled"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineTranscriber-windows
          path: dist/OfflineTranscriber
          retention-days: 14
          compression-level: 1
