name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller huggingface-hub

      - name: Cache speech model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model
          key: whisper-large-v3-turbo-ct2-v1

      - name: Download speech model (~1.5GB)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # HF rate-limits shared CI IPs (429) - retry with backoff
          $delays = 30, 60, 120, 240
          foreach ($d in $delays + 0) {
            python scripts/download_model.py model
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($d -eq 0) { break }
            Write-Host "Download failed, retrying in $d s ..."
            Start-Sleep -Seconds $d
          }
          exit 1

      - name: Build with PyInstaller
        run: pyinstaller app.spec --noconfirm

      - name: Bundle model and dictionary into output
        shell: pwsh
        run: |
          Copy-Item -Recurse model dist/OfflineTranscriber/model
          Copy-Item dictionary.json dist/OfflineTranscriber/

      - name: Smoke test (imports inside the built app)
        shell: pwsh
        run: |
          if (!(Test-Path "dist/OfflineTranscriber/OfflineTranscriber.exe")) {
            throw "exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineTranscriber-windows
          path: dist/OfflineTranscriber
          retention-days: 14
          compression-level: 1
